<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/
    bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link href='https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css' rel='stylesheet'>
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.5.2/jquery.min.js"></script> <!-- INTERAÇÃO JS COM ALGUMAS FUNÇÕES -->
    <script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.6.1/jquery.min.js"></script> <!-- INTERAÇÃO JS COM ALGUMAS FUNÇÕES -->

    <title>Gary Chatbot</title>
</head>
<body>
    <div class="tudo">
        <div class="title">Gary</div>
        <div onclick="fechar()"></div>
        <div class="box">
            <div class="item">
                <div class="icon">
                    <i class='bx bx-bot'></i>
                </div>
                <div class="msg">
                    <p>Olá sou Gary, seu assistente virtual da SNC-Lavalin.</p>
                    <p>Como posso ajudá-lo(a) ?</p>
                </div>
            </div>
            <br clear="both">
            <div class="item right">
                <div class="person">
                    <i class='bx bxs-user'></i>
                </div>
                <div class="msg">
                    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Impedit, neque sit laborum nostrum laboriosam, ad enim saepe sequi est cupiditate quis nam quisquam aliquid suscipit? Ipsum veniam sapiente quidem libero.</p>
                </div>
            </div>
        </div>
        
        <div class="typing-area">
            <div class="input-field">
                <input type="text" placeholder="Digite sua mensagem..." required>
                <button>Enviar</button>
            </div>
        </div>
    </div>
</body>
</html>
